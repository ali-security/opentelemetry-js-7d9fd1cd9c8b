name: Seal Cross-Platform Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tests:
    strategy:
      fail-fast: false
      matrix:
        node_version:
          - "18"
          - "20"
          - "22"
          - "24"
          - "25"
    runs-on: ubuntu-latest
    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2026-02-12T18%3A36%3A49.312000Z@time-machines-npm.sealsecurity.io/
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: ${{ matrix.node_version }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Compile
        run: npx nx run @opentelemetry/propagator-jaeger:compile

      - name: Unit tests
        run: npx nx run @opentelemetry/propagator-jaeger:test

  node-windows-tests:
    runs-on: windows-latest
    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2026-02-12T18%3A36%3A49.312000Z@time-machines-npm.sealsecurity.io/
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
          node-version: '22.22.1'

      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Bootstrap
        run: npm ci --ignore-scripts

      - name: Compile
        run: |
          npm config set script-shell "C:\\Program Files\\git\\bin\\bash.exe"
          npx nx run @opentelemetry/propagator-jaeger:compile

      - name: Unit tests
        run: |
          npm config set script-shell "C:\\Program Files\\git\\bin\\bash.exe"
          npx nx run @opentelemetry/propagator-jaeger:test
